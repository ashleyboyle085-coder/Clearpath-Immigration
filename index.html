<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clearpath Immigration</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --navy: #0d1f3c; --navy-light: #1a3260;
    --gold: #b8974a; --gold-light: #d4b06a;
    --charcoal: #1e2535;
    --white: #ffffff; --offwhite: #f7f5f2;
    --gray: #6b7280;
  }
  html { scroll-behavior: smooth; }
  body { font-family: 'Poppins', sans-serif; background: var(--offwhite); color: var(--navy); overflow-x: hidden; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--offwhite); }
  ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 3px; }

/* NAV */
header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  display: flex; justify-content: space-between; align-items: center;
  padding: 0 8%; height: 70px;
  background: rgba(13,31,60,0.97); backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(184,151,74,0.2); transition: all 0.3s;
}
header.scrolled { height: 60px; box-shadow: 0 4px 30px rgba(0,0,0,0.3); }
.logo { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 700; color: var(--white); }
.logo span { color: var(--gold); }
nav { display: flex; align-items: center; gap: 0.3rem; }
nav a { color: rgba(255,255,255,0.75); padding: 0.5rem 1rem; text-decoration: none; font-size: 0.82rem; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; transition: color 0.2s; position: relative; }
nav a::after { content: ''; position: absolute; bottom: 0; left: 1rem; right: 1rem; height: 1px; background: var(--gold); transform: scaleX(0); transition: transform 0.25s; }
nav a:hover { color: var(--white); }
nav a:hover::after { transform: scaleX(1); }
.nav-cta { background: var(--gold) !important; color: var(--navy) !important; border-radius: 4px; font-weight: 600 !important; margin-left: 0.5rem; }
.nav-cta::after { display: none !important; }
.nav-cta:hover { background: var(--gold-light) !important; }

/* HERO */
.hero { height: 100vh; min-height: 600px; position: relative; display: flex; align-items: center; justify-content: center; text-align: center; overflow: hidden; }
.hero-bg { position: absolute; inset: 0; background: url("https://images.unsplash.com/photo-1552664730-d307ca884978?w=1600&q=80") center/cover no-repeat; transform: scale(1.05); transition: transform 8s ease; }
.hero-bg.loaded { transform: scale(1); }
.hero-overlay { position: absolute; inset: 0; background: linear-gradient(135deg, rgba(13,31,60,0.85), rgba(13,31,60,0.6)); }
.hero-content { position: relative; z-index: 2; opacity: 0; transform: translateY(30px); transition: opacity 0.9s, transform 0.9s; }
.hero-content.visible { opacity: 1; transform: translateY(0); }
.hero-tag { display: inline-flex; align-items: center; gap: 0.6rem; font-size: 0.75rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold); font-weight: 500; margin-bottom: 1.5rem; }
.hero-tag::before, .hero-tag::after { content: ''; width: 30px; height: 1px; background: var(--gold); }
.hero h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(3rem,6vw,5.5rem); color: var(--white); font-weight: 700; line-height: 1.1; margin-bottom: 1.2rem; }
.hero h1 span { color: var(--gold); }
.hero p { font-size: 1.05rem; color: rgba(255,255,255,0.8); max-width: 500px; margin: 0 auto 2.5rem; line-height: 1.7; }
.hero-btns { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
.btn { padding: 0.9rem 2rem; border-radius: 4px; font-family: 'Poppins', sans-serif; font-size: 0.85rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; text-decoration: none; border: none; cursor: pointer; transition: all 0.25s; display: inline-block; }
.btn-gold { background: var(--gold); color: var(--navy); }
.btn-gold:hover { background: var(--gold-light); transform: translateY(-2px); box-shadow: 0 8px 25px rgba(184,151,74,0.4); }
.btn-outline-white { background: transparent; color: var(--white); border: 1.5px solid rgba(255,255,255,0.5); }
.btn-outline-white:hover { border-color: var(--white); background: rgba(255,255,255,0.1); transform: translateY(-2px); }
.hero-scroll { position: absolute; bottom: 2rem; left: 50%; transform: translateX(-50%); z-index: 2; display: flex; flex-direction: column; align-items: center; gap: 0.4rem; color: rgba(255,255,255,0.5); font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; animation: bounce 2s infinite; }
.scroll-line { width: 1px; height: 40px; background: linear-gradient(to bottom, rgba(255,255,255,0.5), transparent); }

/* STATS */
.stats-bar { background: var(--navy); display: grid; grid-template-columns: repeat(4,1fr); border-bottom: 2px solid var(--gold); }
.stat-item { padding: 2rem; text-align: center; border-right: 1px solid rgba(255,255,255,0.08); opacity: 0; transform: translateY(20px); transition: opacity 0.5s, transform 0.5s; }
.stat-item.visible { opacity: 1; transform: translateY(0); }
.stat-item:last-child { border-right: none; }
.stat-num { font-family: 'Cormorant Garamond', serif; font-size: 2.5rem; font-weight: 700; color: var(--gold); line-height: 1; }
.stat-label { font-size: 0.75rem; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 0.4rem; }

/* SECTIONS */
section { padding: 6rem 8%; }
.section-intro { text-align: center; max-width: 600px; margin: 0 auto 4rem; }
.section-tag { display: inline-flex; align-items: center; gap: 0.6rem; font-size: 0.72rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold); font-weight: 600; margin-bottom: 0.8rem; }
.section-tag::before { content: ''; width: 20px; height: 1px; background: var(--gold); }
h2 { font-family: 'Cormorant Garamond', serif; font-size: clamp(2rem,3vw,2.8rem); font-weight: 700; line-height: 1.2; }
.section-intro p { color: var(--gray); line-height: 1.75; margin-top: 1rem; font-size: 0.95rem; }

/* SERVICES */
.services { background: var(--offwhite); }
.cards-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 1.5rem; max-width: 1100px; margin: 0 auto; }
.card { background: var(--white); border-radius: 8px; overflow: hidden; box-shadow: 0 2px 20px rgba(13,31,60,0.07); opacity: 0; transform: translateY(30px); transition: opacity 0.5s, transform 0.5s, box-shadow 0.3s; }
.card.visible { opacity: 1; transform: translateY(0); }
.card:hover { transform: translateY(-6px) !important; box-shadow: 0 16px 40px rgba(13,31,60,0.15); }
.card-img { position: relative; overflow: hidden; height: 220px; }
.card-img img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
.card:hover .card-img img { transform: scale(1.07); }
.card-img-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(13,31,60,0.5), transparent 60%); }
.card-icon { position: absolute; top: 1rem; right: 1rem; width: 40px; height: 40px; background: var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }
.card-body { padding: 1.6rem; }
.card-body h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-weight: 700; margin-bottom: 0.6rem; color: var(--navy); }
.card-body p { font-size: 0.87rem; color: var(--gray); line-height: 1.7; }
.card-link { display: inline-flex; align-items: center; gap: 0.4rem; margin-top: 1rem; color: var(--gold); font-size: 0.82rem; font-weight: 600; text-decoration: none; letter-spacing: 0.04em; text-transform: uppercase; transition: gap 0.2s; }
.card-link:hover { gap: 0.7rem; }

/* WHY US */
.why-us { background: var(--navy); color: var(--white); }
.why-us .section-intro p { color: rgba(255,255,255,0.6); }
.why-us h2 { color: var(--white); }
.features-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 2rem; max-width: 1000px; margin: 0 auto; }
.feature { text-align: center; padding: 2.5rem 1.5rem; border: 1px solid rgba(184,151,74,0.2); border-radius: 8px; opacity: 0; transform: translateY(20px); transition: opacity 0.5s, transform 0.5s, border-color 0.3s, background 0.3s; }
.feature.visible { opacity: 1; transform: translateY(0); }
.feature:hover { border-color: var(--gold); background: rgba(184,151,74,0.05); }
.feature-icon { font-size: 2.5rem; margin-bottom: 1rem; }
.feature h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; margin-bottom: 0.8rem; color: var(--gold); }
.feature p { font-size: 0.87rem; color: rgba(255,255,255,0.6); line-height: 1.7; }

/* BOOKING FORM */
.booking { background: var(--offwhite); }
.booking-inner { display: grid; grid-template-columns: 1fr 1.4fr; gap: 4rem; max-width: 1100px; margin: 0 auto; align-items: start; }

/* ── BOOKING INFO PANEL: dark charcoal so white text pops ── */
.booking-info {
  padding: 3rem;
  background: var(--charcoal);
  border-radius: 8px;
  color: var(--white);
  border: 1px solid rgba(184,151,74,0.15);
}
.booking-info h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; color: var(--gold); margin-bottom: 1rem; }
.booking-info p { font-size: 0.9rem; color: rgba(255,255,255,0.7); line-height: 1.8; margin-bottom: 2rem; }
.booking-detail { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.2rem; }
.booking-detail-icon { width: 40px; height: 40px; background: rgba(184,151,74,0.15); border: 1px solid rgba(184,151,74,0.3); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0; }
.booking-detail-label { font-size: 0.7rem; color: var(--gold); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.2rem; }
.booking-detail-text { font-size: 0.88rem; color: rgba(255,255,255,0.85); line-height: 1.5; }

.form-card { background: var(--white); border-radius: 8px; padding: 2.5rem; box-shadow: 0 4px 30px rgba(13,31,60,0.1); }
.form-card h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; color: var(--navy); margin-bottom: 0.4rem; }
.form-card .form-sub { font-size: 0.85rem; color: var(--gray); margin-bottom: 2rem; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1
